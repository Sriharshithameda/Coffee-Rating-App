<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Voting Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero">
    <h1>☕ Coffee Voting Hub</h1>
    <p>Vote For Your Favorite Coffee</p>
</div>

<div class="stats">
    <div class="stat-card">
        <h2 id="totalVotes">0</h2>
        <p>Total Votes</p>
    </div>

    <div class="stat-card">
        <h2 id="winner">-</h2>
        <p>Most Popular Coffee 🏆</p>
    </div>
</div>

<h2 class="section-title">Choose Your Favorite</h2>

<div class="coffee-grid">

    <div class="coffee-card">
        <img src="images/Espresso.jpeg" alt="Espresso">
        <h3>Espresso</h3>

        <div class="vote-count">
            Votes: <span id="espressoVotes">0</span>
        </div>

        <button onclick="voteCoffee('Espresso')">
            Vote ☕
        </button>
    </div>

    <div class="coffee-card">
        <img src="images/Cappuccino.jpeg" alt="Cappuccino">
        <h3>Cappuccino</h3>

        <div class="vote-count">
            Votes: <span id="cappuccinoVotes">0</span>
        </div>

        <button onclick="voteCoffee('Cappuccino')">
            Vote ☕
        </button>
    </div>

    <div class="coffee-card">
        <img src="images/Latte.jpeg" alt="Latte">
        <h3>Latte</h3>

        <div class="vote-count">
            Votes: <span id="latteVotes">0</span>
        </div>

        <button onclick="voteCoffee('Latte')">
            Vote ☕
        </button>
    </div>

    <div class="coffee-card">
        <img src="images/Mocha.jpeg" alt="Mocha">
        <h3>Mocha</h3>

        <div class="vote-count">
            Votes: <span id="mochaVotes">0</span>
        </div>

        <button onclick="voteCoffee('Mocha')">
            Vote ☕
        </button>
    </div>

</div>

<div class="leaderboard">
    <h2>🏆 Live Leaderboard</h2>
    <div id="leaderboard"></div>
</div>

<script src="app.js"></script>

</body>
</html>
